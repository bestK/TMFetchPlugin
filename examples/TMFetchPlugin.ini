; Example configuration for TMFetchPlugin
; Save as TMFetchPlugin.ini in TrafficMonitor's plugin config directory.
;
; The JsonPath field is a free-form template:
;   - bare "$.path.x" tokens are auto-detected and substituted
;   - "$$" emits a literal '$'
;   - "\n" produces a newline in the output (when the host renders it)
;   - "${...}" braces form is also supported (legacy)

[Plugin]
Interval=10000
ItemCount=4

; ---- Item 0: Bitcoin price ----
[Item0]
Name=BTC Price
Id=tmfetch_btc
URL=https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd
Method=GET
Headers=Accept: application/json
JsonPath=BTC: $$$.bitcoin.usd
Interval=30000
Timeout=8000

; ---- Item 1: Public IP ----
[Item1]
Name=Public IP
Id=tmfetch_pubip
URL=https://api.ipify.org?format=json
JsonPath=IP: $.ip
Interval=300000

; ---- Item 2: composite, multiple fields ----
[Item2]
Name=Battery
Id=tmfetch_battery
URL=https://example.com/api/status
JsonPath=电量:$.battery.level%\n状态:$.status
Interval=10000

; ---- Item 3: GitHub stars ----
[Item3]
Name=GitHub Stars
Id=tmfetch_ghstars
Header1=Accept: application/vnd.github+json
Header2=User-Agent: TMFetchPlugin
URL=https://api.github.com/repos/zhongyang219/TrafficMonitor
JsonPath=★ $.stargazers_count
Interval=600000
